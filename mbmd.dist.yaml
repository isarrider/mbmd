# REST api, use 127.0.0.1 to restrict to localhost
api: 0.0.0.0:8080

# mqtt config
mqtt:
  broker: localhost:1883
  topic: mbmd
  user:
  password:
  clientid: mbmd
  qos: 0
  homie: homie

# influxdb_v1 config
influx:
  url: http://localhost:8086
  database: data
  measurement: mbmd
  user:
  password:
  # 0 = retry indefinitely while DB is unavailable (recommended)
  max-retries: 0
  # max number of points to keep in memory while DB is unavailable
  retry-buffer-limit: 100000
  # max backoff interval between retries in milliseconds
  max-retry-interval: 60000

# influxdb_v2 config
influx:
  url: http://localhost:8086
  database: data
  measurement: mbmd
  organization:
  token:
  # 0 = retry indefinitely while DB is unavailable (recommended)
  max-retries: 0
  # max number of points to keep in memory while DB is unavailable
  retry-buffer-limit: 100000
  # max backoff interval between retries in milliseconds
  max-retry-interval: 60000

# adapters are referenced by device
adapters:
- device: /dev/ttyUSB0
  baudrate: 9600
  comset: 8N1 # "8E1" needs be quoted as string or will error
- device: 192.168.0.7:23
  rtu: true # Modbus RS485 to Ethernet converter uses RTU over TCP

# list of devices
devices:
- name: sdm1
  type: sdm
  id: 1
  adapter: /dev/ttyUSB0
- name: sdm2
  type: sdm
  id: 1
  adapter: 192.168.0.7:23
- name: sma1
  type: sunspec
  id: 126
  subdevice: 0 # use subdevice to access SunSpec subdevices
  adapter: 192.168.0.40:502
